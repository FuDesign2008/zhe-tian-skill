name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'commands/**'
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version bump type (auto = detect from commit message)'
        required: false
        default: 'auto'
        type: choice
        options: [auto, major, minor, patch]

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # 防止 version bump commit 再次触发，造成无限循环
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current-version
        run: |
          VERSION=$(grep '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump-type
        run: |
          MANUAL_TYPE="${{ github.event.inputs.bump-type }}"

          if [[ -n "$MANUAL_TYPE" && "$MANUAL_TYPE" != "auto" ]]; then
            echo "type=$MANUAL_TYPE" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qi "BREAKING CHANGE"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?:|^feature(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: new-version
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          BUMP_TYPE="${{ steps.bump-type.outputs.type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Bump package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          # Bump SKILL.md frontmatter version
          sed -i "s/^version: '.*'/version: '$NEW_VERSION'/" skills/zhetian/SKILL.md

          # Bump README.md version badge
          sed -i "s|version-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*-blue|version-$NEW_VERSION-blue|" README.md

      - name: Open PR and merge version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          VERSION="${{ steps.new-version.outputs.version }}"
          BRANCH="chore/version-bump-${VERSION}-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # Keep in sync with the bump sed commands above
          git add package.json skills/zhetian/SKILL.md README.md
          git commit -m "chore: bump version to ${VERSION}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to ${VERSION}" \
            --body "由 Auto Version Bump workflow 自动创建。将以 squash 合并并附带 [skip ci]，避免再次触发 release workflow。")
          PR_NUM="${PR_URL##*/}"

          # Retry merge up to 5 times — GitHub may need a few seconds to
          # settle the base branch ref after PR creation or a recent merge.
          for ATTEMPT in 1 2 3 4 5; do
            if gh pr merge "$PR_NUM" --squash \
              --subject "chore: bump version to ${VERSION} [skip ci]" \
              --delete-branch; then
              echo "Merge succeeded on attempt $ATTEMPT"
              break
            fi
            if [ "$ATTEMPT" -eq 5 ]; then
              echo "::error::Merge failed after 5 attempts"
              exit 1
            fi
            echo "Merge attempt $ATTEMPT failed, retrying in ${ATTEMPT}0s..."
            sleep "${ATTEMPT}0"
          done

          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Create tag
        run: |
          git tag -a "v${{ steps.new-version.outputs.version }}" -m "Release v${{ steps.new-version.outputs.version }}"
          git push origin "v${{ steps.new-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-version.outputs.version }}
          name: v${{ steps.new-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
